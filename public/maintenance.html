<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Mode — Failerry</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #0A0A0A; 
            color: #ffffff; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(12deg); }
            50% { transform: translateY(-15px) rotate(15deg); }
            100% { transform: translateY(0) rotate(12deg); }
        }

        @keyframes glow {
            0% { text-shadow: 0 0 10px rgba(255,255,255,0.05); }
            50% { text-shadow: 0 0 30px rgba(255,255,255,0.15); }
            100% { text-shadow: 0 0 10px rgba(255,255,255,0.05); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        .animate-slide-up { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-glow { animation: glow 4s ease-in-out infinite; }
        
        .gear-large {
            animation: spin 8s linear infinite;
        }

        .gear-small {
            animation: spin-reverse 4s linear infinite;
        }

        .max-w-md {
            max-width: 28rem;
            width: 100%;
            padding: 1.5rem;
            box-sizing: border-box;
            text-align: center;
            position: relative;
        }

        .ghost-code {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            user-select: none;
            z-index: 0;
            line-height: 1;
        }

        @media (min-width: 768px) {
            .ghost-code {
                font-size: 20rem;
            }
        }

        .content-card {
            position: relative;
            z-index: 10;
        }

        .logo-container {
            width: 5rem;
            height: 5rem;
            background-color: #ffffff;
            color: #000000;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-text {
            font-size: 2.25rem;
            font-weight: 900;
            font-style: italic;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            margin-top: 0;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .message {
            color: #888888;
            font-weight: 500;
            font-size: 1.125rem;
            margin-top: 0;
            margin-bottom: 2.5rem;
            line-height: 1.625;
        }

        .btn {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            font-weight: 900;
            font-size: 0.75rem;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 0.2em;
            padding: 1.25rem 2.5rem;
            border-radius: 1rem;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(255, 255, 255, 0.1);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .gear-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .gear-wrapper {
            position: relative;
            width: 6rem;
            height: 6rem;
        }
    </style>
</head>
<body>
    
    <div class="max-w-md">
        <!-- Big Ghosty Error Code -->
        <div class="ghost-code animate-glow">
            503
        </div>

        <div class="content-card animate-slide-up">
            
            <div class="gear-container">
                <div class="gear-wrapper">
                    <!-- Gear Large -->
                    <svg class="gear-large" style="width: 4rem; height: 4rem; position: absolute; top: 0; left: 0; color: #E60023;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <!-- Gear Small -->
                    <svg class="gear-small" style="width: 2.5rem; height: 2.5rem; position: absolute; bottom: 0.25rem; right: 0.25rem; color: #888888;" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </div>
            </div>

            <div class="logo-container animate-float">
                <span class="logo-text">B</span>
            </div>
            
            <h1 class="title">Maintenance Mode</h1>
            <p class="message">
                Kami sedang melakukan pemeliharaan rutin untuk meningkatkan performa Failerry. Kami akan segera kembali dalam beberapa saat!
            </p>

            <a href="/" class="btn">
                Coba Lagi
            </a>
        </div>
    </div>

</body>
</html>
